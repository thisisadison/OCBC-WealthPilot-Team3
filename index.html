<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OCBC My OneTeam — Log in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #ec1c24; 
    --red-dark: #c20f17; 
    --red-tint: #fdecec;
    --ink: #14161b; 
    --ink2: #3a3f47; 
    --muted: #737984; 
    --line: #e9eaee; 
    --bg: #f5f6f8; 
    --card: #fff;
    --fi: #2f6fd6; 
    --funds: #ec1c24; 
    --cash: #0fa37f; 
    
    --alt: #7c3aed; 
    
    --ai1: #ec1c24; 
    --ai2: #c20f17;
    
    --green: #1f9d57; 
    --amber: #e08600;
    --r: 18px; 
    
    --shadow: 0 1px 2px rgba(18,20,28,.05), 0 10px 30px rgba(18,20,28,.07);
    
    --glow: 0 0 0 1px rgba(236,28,36,.25), 0 8px 30px rgba(236,28,36,.22);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#d7dbe2;color:var(--ink);
    -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;align-items:center;padding:20px 14px 40px}
  h1,h2,h3,.disp{font-family:'Sora','Inter',sans-serif;letter-spacing:-.02em}

  .demobar{width:100%;max-width:900px;display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;justify-content:center}
  .demobar .brand{font-family:'Sora';font-weight:800;color:var(--red);margin-right:auto;display:flex;align-items:center;gap:8px;font-size:15px}
  .demobar .brand small{color:var(--muted);font-weight:500;font-family:'Inter'}
  .demobar button{border:1px solid var(--line);background:#fff;color:var(--ink);padding:8px 12px;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer}
  .demobar button:hover{background:#f6f7f9}
  .stepwrap{font-size:13px;color:var(--muted);font-weight:600}

  .phone{width:402px;max-width:97vw;background:#0a0b0d;border-radius:50px;padding:11px;box-shadow:0 40px 80px rgba(0,0,0,.4);position:relative}
  .screen{background:var(--bg);border-radius:40px;overflow:hidden;position:relative;display:flex;flex-direction:column;height:846px}
  .notch{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:122px;height:32px;background:#0a0b0d;border-radius:20px;z-index:40}
  .statusbar{height:50px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 26px 8px;font-size:13px;font-weight:600;color:var(--ink);position:relative;z-index:10}
  .statusbar.over{background:#e4eef9;position:relative;z-index:10}
  .statusbar.light{color:#fff}
  .statusbar.onhero{background:linear-gradient(90deg,#fbfaf8,#f4f2fa 55%,#e9e7fb);position:relative;z-index:10}
  .view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative;min-height:0}
  .view::-webkit-scrollbar{width:0}
  .pad{padding:6px 22px 28px}

  .appbar{display:flex;align-items:center;gap:10px;padding:4px 18px 8px}
  .appbar .back{width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px}
  .appbar .ttl{font-size:13px;font-weight:700;color:var(--muted)}
  .appbar .ologo{margin-left:auto;font-family:'Sora';font-weight:800;color:var(--red);font-size:15px}

  h1{font-size:25px;line-height:1.18;margin:8px 0 6px;font-weight:800}
  h2{font-size:15px;margin:18px 0 9px;font-weight:700;font-family:'Sora'}
  .sub{color:var(--muted);font-size:14px;line-height:1.5;margin:0 0 16px}
  p.copy{font-size:14.5px;line-height:1.55;color:var(--ink2)}
  .eyebrow{font-size:11px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--red)}
  .eyebrow.ai{background:linear-gradient(120deg,var(--ai1),var(--ai2));-webkit-background-clip:text;background-clip:text;color:transparent}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:17px;box-shadow:var(--shadow);margin-bottom:13px}
  .card.flat{box-shadow:none}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;border-radius:15px;padding:16px;font-size:15px;font-weight:700;cursor:pointer;margin-top:11px;transition:transform .05s,filter .15s,box-shadow .2s;font-family:'Inter'}
  .btn:active{transform:scale(.99)}
  .btn.primary{background:var(--red);color:#fff;box-shadow:0 8px 20px rgba(236,28,36,.28)}
  .btn.primary:hover{filter:brightness(1.04)}
  .btn.dark{background:var(--ink);color:#fff}
  .btn.ai{background:linear-gradient(120deg,#ec1c24,#c20f17);color:#fff;box-shadow:0 8px 20px rgba(236,28,36,.28)}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn.ghost:hover{background:#f7f8fa}
  .btn.link{background:transparent;color:var(--red);box-shadow:none}
  .pulse{animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 8px 20px rgba(236,28,36,.28)}50%{box-shadow:0 8px 30px rgba(236,28,36,.5)}}
  .judgebtn{background:#fff;color:#a87b1f;border:1.5px solid #caa23a;position:relative;overflow:hidden;animation:judgeGlow 2.4s ease-in-out infinite}
  @keyframes judgeGlow{0%,100%{box-shadow:0 4px 14px rgba(202,162,58,.18)}50%{box-shadow:0 6px 22px rgba(202,162,58,.42)}}
  .glowpulse{animation:pulse 2.2s ease-in-out infinite}
  @keyframes gp{0%,100%{box-shadow:0 8px 24px rgba(236,28,36,.3)}50%{box-shadow:0 8px 34px rgba(236,28,36,.55)}}

  .trust{background:var(--red-tint);border:1px solid #f7d2d4;border-radius:13px;padding:12px 14px;font-size:13px;line-height:1.45;color:#7a1d22;margin:14px 0}
  .trust b{color:var(--red-dark)}
  .note{font-size:12px;color:var(--muted);text-align:center;margin:10px 0}
  .field{width:100%;border:1px solid var(--line);border-radius:13px;padding:15px;font-size:15px;background:#fff;margin-bottom:10px;font-family:'Inter'}

  /* questionnaire */
  .qcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;box-shadow:var(--shadow);margin-bottom:13px}
  .qhead{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .qhead .miniframe{border-radius:50%;overflow:hidden;line-height:0;flex-shrink:0;box-shadow:0 2px 6px rgba(18,20,28,.12)}
  .stepbadge{display:inline-block;font-size:13px;font-weight:800;letter-spacing:.02em;color:var(--red);background:var(--red-tint);padding:5px 12px;border-radius:20px;margin-bottom:10px}
  .verdictcard{background:var(--ink);color:#fff;border-radius:18px;padding:18px;margin-top:16px;box-shadow:0 14px 36px rgba(18,20,28,.28)}
  .verdictcard .vhead{display:flex;align-items:center;gap:11px}
  .verdictcard .veyebrow{font-size:10.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#f5c518}
  .verdictcard .vtitle{font-family:'Sora';font-weight:800;font-size:18px;margin-top:1px}
  .verdictcard .vsub{font-size:12px;line-height:1.5;color:rgba(255,255,255,.7);margin:11px 0 14px}
  .vbar{display:flex;align-items:center;gap:10px;margin-bottom:9px}
  .vbar .vbl{display:flex;align-items:center;gap:7px;width:108px;flex-shrink:0;font-size:12px;font-weight:600}
  .vbar .vsw{width:9px;height:9px;border-radius:3px;flex-shrink:0}
  .vbar .vtrack{flex:1;height:8px;border-radius:5px;background:rgba(255,255,255,.14);overflow:hidden}
  .vbar .vtrack span{display:block;height:100%;border-radius:5px;transition:width .6s ease}
  .vbar .vpc{width:40px;text-align:right;font-family:'Sora';font-weight:800;font-size:14px;font-variant-numeric:tabular-nums}

  /* returning-user home */
  .livedot{width:8px;height:8px;border-radius:50%;background:#34d399;box-shadow:0 0 0 0 rgba(52,211,153,.6);animation:lp 1.8s infinite}
  @keyframes lp{0%{box-shadow:0 0 0 0 rgba(52,211,153,.5)}70%{box-shadow:0 0 0 7px rgba(52,211,153,0)}100%{box-shadow:0 0 0 0 rgba(52,211,153,0)}}
  .pilotHero{background:linear-gradient(135deg,#ec1c24,#a90c12);color:#fff;border-radius:20px;padding:18px;box-shadow:0 14px 34px rgba(236,28,36,.3)}
  .pilotHero .hbar{height:8px;border-radius:5px;background:rgba(255,255,255,.25);overflow:hidden;margin-top:6px}
  .pilotHero .hbar span{display:block;height:100%;background:#fff;border-radius:5px}
  .activeppl{background:linear-gradient(135deg,#fff,#fff5f5);border:1px solid #f6d2d4}
  .activeppl .pt{color:var(--ink)}.activeppl .pd{color:var(--ink2)}
  .feedcard{background:#fff;border:1px solid var(--line);border-radius:15px;padding:14px;box-shadow:var(--shadow);margin-bottom:11px}
  .feedcard.hot{border-color:#f6c9cb;background:#fffafa}
  .feedtop{display:flex;align-items:center;gap:10px;margin-bottom:9px}
  .feedtop .miniframe{border-radius:50%;overflow:hidden;line-height:0;flex-shrink:0;box-shadow:0 2px 6px rgba(18,20,28,.12)}
  .feedname{font-family:'Sora';font-weight:800;font-size:13.5px}
  .feedtime{font-size:11px;color:var(--muted)}
  .newdot{margin-left:auto;font-size:9px;font-weight:800;letter-spacing:.05em;background:var(--red);color:#fff;padding:3px 7px;border-radius:6px}
  .feedtext{font-size:13px;line-height:1.5;color:var(--ink2);margin-bottom:11px}
  .feedact{display:flex;gap:9px;align-items:center}
  .fbtn{background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px 14px;font-size:13px;font-weight:700;cursor:pointer;color:var(--ink)}
  .reviewcard{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:15px;padding:14px;box-shadow:var(--shadow);cursor:pointer}
  .reviewcard .opt-ic{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .propcard{display:flex;align-items:center;gap:11px;background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:13px;margin-bottom:10px;cursor:pointer;transition:.12s}
  .propcard.on{border-color:var(--red);background:#fffafa}
  .propcard .miniframe{border-radius:50%;overflow:hidden;line-height:0;flex-shrink:0}
  .propt{font-family:'Sora';font-weight:800;font-size:13.5px}
  .propd{font-size:11.5px;color:var(--muted);line-height:1.4;margin-top:2px}
  .propchk{width:24px;height:24px;border-radius:50%;border:1.5px solid #d2d5da;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:13px;flex-shrink:0}
  .propcard.on .propchk{background:var(--red);border-color:var(--red)}
  .qname{font-family:'Sora';font-weight:800;font-size:14px}
  .qdesc{font-size:11.5px;color:var(--muted)}
  .qfield{margin-top:11px}
  .qfield label{display:block;font-size:12.5px;font-weight:600;color:var(--ink2);margin-bottom:5px}
  .qtag{font-size:9px;font-weight:800;background:#eef3ff;color:#2f6fd6;padding:2px 6px;border-radius:5px;text-transform:uppercase;letter-spacing:.03em}
  .qinwrap{display:flex;align-items:center;border:1px solid var(--line);border-radius:11px;background:#fff;overflow:hidden}
  .qinwrap:focus-within{border-color:var(--red)}
  .qpfx{padding:0 4px 0 11px;color:var(--muted);font-weight:700;font-size:13px}
  .qsfx{padding:0 11px;color:var(--muted);font-weight:600;font-size:12px}
  .qin{flex:1;min-width:0;border:none;outline:none;padding:12px 11px;font-size:15px;font-weight:700;font-family:'Sora';background:transparent;color:var(--ink)}
  .amtinwrap{flex:1;border-radius:9px}
  .amtin{padding:8px 8px;font-size:13.5px}
  .rkopts{display:flex;flex-wrap:wrap;gap:7px}
  .rkopt{border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:9px 12px;font-size:12.5px;font-weight:600;color:var(--ink2);cursor:pointer;transition:.12s;text-align:left}
  .rkopt.on{border-color:var(--red);background:var(--red-tint);color:var(--red)}
  .qq{display:flex;gap:9px;font-size:13.5px;font-weight:700;color:var(--ink);line-height:1.4;margin-bottom:11px}
  .qnum{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--ink);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center}
  .rccard{background:linear-gradient(135deg,#fff,#fff5f5);border:1.5px solid #f6c9cb;border-radius:16px;padding:17px;margin:4px 0 16px;box-shadow:0 10px 26px rgba(236,28,36,.1)}
  .rceyebrow{font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--red)}
  .rclabel{font-family:'Sora';font-weight:800;font-size:21px;margin:2px 0 6px;color:var(--ink)}
  .rcdesc{font-size:13px;line-height:1.5;color:var(--ink2)}
  .rcdiv{height:1px;background:#f1d3d5;margin:13px 0}
  .rcport{font-family:'Sora';font-weight:800;font-size:16px;color:var(--ink);margin-top:2px}
  .rcnote{font-size:11.5px;color:var(--muted);margin-top:5px}
  .addcount{margin-left:auto;font-size:10.5px;color:var(--muted);font-weight:700}
  .regwrap{display:flex;flex-wrap:wrap;gap:7px}
  .regchip{border:1.5px solid var(--line);background:#fff;border-radius:20px;padding:8px 13px;font-size:12.5px;font-weight:600;color:var(--ink2);cursor:pointer;transition:.12s}
  .regchip.on{border-color:var(--red);background:var(--red-tint);color:var(--red)}
  .feedtag{font-size:11.5px;color:var(--muted);font-weight:600;background:#f4f4f5;border-radius:8px;padding:7px 10px;text-align:center}
  .learnlink{display:inline-block;margin-top:4px;font-size:13px;font-weight:700;color:var(--red);cursor:pointer}

  /* OCBC Singapore pre-login */
  .ocbcpre{min-height:100%;background:#fff;position:relative}
  .oltop{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 4px;position:relative;z-index:2}
  .oltop .olicon{font-size:17px;color:#33373d;width:26px;text-align:center}
  .onetokenpill{background:#0c1f17;color:#3ddc97;font-size:11px;font-weight:700;padding:6px 14px;border-radius:20px;letter-spacing:.02em}
  .oherowrap{padding:14px 22px 6px;text-align:center;position:relative;z-index:1}
  .oherotext{font-size:15px;color:#3a3f47;line-height:1.45;margin-bottom:12px}
  .oherotext b{color:var(--red);font-weight:800}
  .oheroimg{border-radius:14px;overflow:hidden;max-width:300px;margin:0 auto;box-shadow:0 6px 18px rgba(0,0,0,.08)}
  .ogrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px 4px;padding:20px 16px 8px}
  .ogi{display:flex;flex-direction:column;align-items:center;gap:7px;font-size:11px;color:#33373d;font-weight:500;cursor:pointer;padding:8px 4px;border-radius:12px}
  .ogi:active{background:#f6f7f9}
  .ogic{width:46px;height:46px;border-radius:14px;background:#f4f5f7;display:flex;align-items:center;justify-content:center;font-size:18px;color:#c0392b}
  .ologin-wrap{position:sticky;bottom:0;background:#fff;padding:8px 16px 0;margin-top:auto;box-shadow:0 -8px 20px rgba(255,255,255,.95)}
  .ologin{width:100%;background:#3a4754;color:#fff;border:none;border-radius:26px;padding:16px;font-size:15px;font-weight:700;font-family:'Sora';cursor:pointer;display:block}
  .ologin:active{background:#2c3741}
  .omaint{font-size:11px;color:#6b7280;line-height:1.45;padding:10px 2px 16px}
  .omaint b{color:#3a3f47}
  .omaint a{color:var(--red);font-weight:600;cursor:pointer}

  /* option cards (next step) */
  .optcard{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:15px;padding:15px;box-shadow:var(--shadow);margin-bottom:11px;cursor:pointer;transition:.12s}
  .optcard:hover{border-color:#d7dbe2;transform:translateY(-1px)}
  .optcard.hot{border-color:#f6c9cb;background:#fffafa}
  .optcard .opt-ic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;font-weight:800}
  .opt-t{font-family:'Sora';font-weight:800;font-size:14px;line-height:1.25}
  .opt-d{font-size:12px;color:var(--muted);line-height:1.45;margin-top:2px}
  .opt-go{margin-left:auto;color:var(--muted);font-size:22px;font-weight:300}
  .optcard .opt-t{font-size:14.5px}
  .amttag{margin-left:auto;font-family:'Sora';font-weight:800;font-size:12px;font-variant-numeric:tabular-nums}
  .row{display:flex;align-items:center;gap:12px}
  .kpi{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px dashed var(--line);font-size:14px}
  .kpi:last-child{border-bottom:none}
  .good{color:var(--green)}.warn{color:var(--amber)}.muted{color:var(--muted)}
  .swatch{width:11px;height:11px;border-radius:3px;display:inline-block;flex-shrink:0}

  /* AI co-pilot */
  .ai-strip {
    position: relative;
    /* Swapped lavender gradient to a soft red/tint gradient */
    background: linear-gradient(120deg, var(--red-tint), #fffcfc);
    /* Swapped to a soft red border */
    border: 1px solid #fbcbc9;
    border-radius: 16px;
    padding: 13px 14px;
    margin-bottom: 13px;
    overflow: hidden;
  }

  .ai-strip::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background: linear-gradient(var(--ai1), var(--ai2));
  }

  .ai-head {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 6px;
  }

  .ai-orb {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--ai1), var(--ai2));
    box-shadow: var(--glow);
    position: relative;
    flex-shrink: 0;
  }

  .ai-orb::after {
    content: '';
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    background: rgba(255, 255, 255, .55);
    animation: breathe 2.4s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(.7); opacity: .5; }
    50% { transform: scale(1); opacity: .9; }
  }

  .ai-name {
    font-family: 'Sora';
    font-weight: 700;
    font-size: 13px;
    background: linear-gradient(120deg, var(--ai1), var(--ai2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .ai-msg {
    font-size: 13px;
    line-height: 1.5;
    color: var(--ink2); 
  }

  .ai-msg b {
    color: var(--red-dark); 
  }

  /* segmented */
  .seg{display:flex;gap:7px;background:#eceef1;border-radius:13px;padding:4px;margin:6px 0 12px}
  .seg .s{flex:1;text-align:center;padding:9px 6px;border-radius:10px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;transition:.15s}
  .seg .s.on{background:#fff;color:var(--ink);box-shadow:var(--shadow)}

  /* goal cards */
  .goalgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .goal{border:1.5px solid var(--line);border-radius:16px;padding:15px;background:#fff;cursor:pointer;transition:.15s}
  .goal .ge{font-size:26px}
  .goal .gt{font-weight:700;font-size:14px;margin-top:8px;font-family:'Sora'}
  .goal .gd{font-size:12px;color:var(--muted);margin-top:2px}
  .goal.sel{border-color:var(--red);background:var(--red-tint);box-shadow:0 8px 20px rgba(236,28,36,.12)}

  /* link rows */
  .lrow{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:9px;cursor:pointer;transition:.15s}
  .lrow:hover{border-color:#d7d9df}
  .lrow .li{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0;font-weight:800;font-size:13px;font-family:'Sora'}
  .lrow .ln{font-weight:700;font-size:14px}.lrow .lx{font-size:12px;color:var(--muted)}
  .lpill{margin-left:auto;font-size:12px;font-weight:700;padding:7px 12px;border-radius:20px}
  .lpill.todo{background:#eef0f3;color:var(--ink2)}
  .lpill.done{background:#e7f6ee;color:var(--green)}

  .meter{height:14px;background:#eceef1;border-radius:20px;overflow:hidden;margin:6px 0}
  .meter>span{display:block;height:100%;border-radius:20px;background:linear-gradient(90deg,var(--ai1),var(--ai2));transition:width .7s cubic-bezier(.2,.8,.2,1)}

  /* donut + buckets */

    margin: 14px -8px 0;

function shade(hex,amt){
  const h=hex.replace('#','');
  let r=parseInt(h.substring(0,2),16),g=parseInt(h.substring(2,4),16),b=parseInt(h.substring(4,6),16);
  r=Math.max(0,Math.min(255,r+amt));g=Math.max(0,Math.min(255,g+amt));b=Math.max(0,Math.min(255,b+amt));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function riskIndex(){
  if(state.riskOverride!=null)return state.riskOverride;
  const app=appetiteScore();                 // avg risk appetite of chosen agents (1..3)
  const yrs=horizon()||state.years||6;
  let idx = app<1.5?0 : app<2.0?1 : app<2.5?2 : app<2.9?3 : 4;
  if(yrs>=12 && idx<4) idx++;                 // long runway → can take a bit more risk
  else if(yrs<=3 && idx>0) idx--;             // very short → dial back
  return Math.max(0,Math.min(4,idx));
}
function riskProfile(){return RISK_WORDS[riskIndex()];}
function applyRiskTilt(){const d=riskIndex()-2;if(!d)return; // Balanced(2) = neutral
  const growth=['Funds','Alt'],defensive=['FI','Cash'];
  const step=Math.abs(d)*6,from=d>0?defensive:growth,to=d>0?growth:defensive;
  let pool=0;from.forEach(k=>{const take=Math.min(state.buckets[k],Math.round(step/from.length));state.buckets[k]-=take;pool+=take;});
  to.forEach(k=>{state.buckets[k]+=Math.round(pool/to.length);});
  let tot=KEYS4.reduce((s,k)=>s+state.buckets[k],0);if(tot!==100){const big=KEYS4.reduce((a,b)=>state.buckets[b]>state.buckets[a]?b:a,'FI');state.buckets[big]+=100-tot;}}

    let r={},tot=0;KEYS4.forEach(k=>{r[k]=Math.round(sum[k]/sel.length);tot+=r[k];});
    if(tot!==100){const big=KEYS4.reduce((a,b)=>r[b]>r[a]?b:a,'FI');r[big]+=100-tot;}
    state.buckets=r;applyRiskTilt();recommendAmounts();recalcBuckets();}

function recommendAmounts(){KEYS4.forEach(k=>{
  const bvTarget=POOL*state.buckets[k]/100;
  const active=PRODUCTS.filter(p=>p.bucket===k);
  const per=active.length?Math.round(bvTarget/active.length/1000)*1000:Math.round(bvTarget/1000)*1000;
  active.forEach(p=>{p.amt=per;});
  // a sensible default amount for shelf products of this class, used when added

});}

  KEYS4.forEach(k=>{state.buckets[k]=Math.round(bucketVal(k)/tot*100);});
  let s=KEYS4.reduce((a,k)=>a+state.buckets[k],0);if(s!==100){const big=KEYS4.reduce((a,b)=>state.buckets[b]>state.buckets[a]?b:a,'FI');state.buckets[big]+=100-s;}

function projChart(){
  const yrs=horizon();const pts=projSeries();const n=pts.length-1;
  const W=320,H=160,padL=40,padR=12,padT=12,padB=20;
  const target=targetVal(), maxV=Math.max(target*1.06,Math.max.apply(null,pts)*1.06), minV=Math.min.apply(null,pts)*.94;
  const plotW=W-padL-padR, plotH=(H-padB)-padT;
  const X=i=>padL+i/n*plotW, Y=v=>(H-padB)-(v-minV)/(maxV-minV)*plotH;
  let out=`<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">`;
  // y gridlines + value labels
  for(let g=0;g<=3;g++){const yy=padT+g*plotH/3;const val=maxV-(g/3)*(maxV-minV);
    out+=`<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${W-padR}" y2="${yy.toFixed(1)}" stroke="rgba(255,255,255,.08)"/>`;
    out+=`<text x="${padL-6}" y="${(yy+3).toFixed(1)}" text-anchor="end" font-family="Inter" font-size="8" fill="#9aa0aa">S$${Math.round(val/1000)}k</text>`;}
  // axis lines
  out+=`<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${H-padB}" stroke="rgba(255,255,255,.28)"/>`;
  out+=`<line x1="${padL}" y1="${H-padB}" x2="${W-padR}" y2="${H-padB}" stroke="rgba(255,255,255,.28)"/>`;
  // target line
  const gy=Y(target);out+=`<line x1="${padL}" y1="${gy.toFixed(1)}" x2="${W-padR}" y2="${gy.toFixed(1)}" stroke="#9aa0aa" stroke-width="1.4" stroke-dasharray="4 4"/>`;
  out+=`<text x="${W-padR}" y="${(gy-5).toFixed(1)}" text-anchor="end" font-family="Inter" font-size="9" fill="#c7ccd4">Target S$${(target/1000).toFixed(0)}k</text>`;
  // area + line
  let d='';for(let i=0;i<=n;i++){d+=(i?'L':'M')+X(i).toFixed(1)+' '+Y(pts[i]).toFixed(1)+' ';}
  out+=`<path d="${d}L ${X(n).toFixed(1)} ${H-padB} L ${X(0).toFixed(1)} ${H-padB} Z" fill="url(#ga)" opacity=".45"/>`;
  out+=`<path d="${d}" fill="none" stroke="url(#g1)" stroke-width="2.4" stroke-linejoin="round"/>`;
  // news markers
  NEWS.forEach(ev=>{const i=Math.round(ev.x*n);const x=X(i),y=Y(pts[i]);const col=ev.dir>0?'#34d399':'#fb7185';
    out+=`<line x1="${x.toFixed(1)}" y1="${y.toFixed(1)}" x2="${x.toFixed(1)}" y2="${H-padB}" stroke="${col}" stroke-width="1" stroke-dasharray="2 3" opacity=".5"/>`;
    out+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="5.5" fill="${col}" stroke="#14161c" stroke-width="2"/>`;
    out+=`<text x="${x.toFixed(1)}" y="${(y-9).toFixed(1)}" text-anchor="middle" font-family="Inter" font-weight="700" font-size="8.5" fill="${col}">${ev.dir>0?'+':'–'}</text>`;});
  // sim 'you are here'
  if(state.simT){const i=Math.min(n,Math.round((state.simT/yrs)*n));out+=`<line x1="${X(i).toFixed(1)}" y1="${padT}" x2="${X(i).toFixed(1)}" y2="${H-padB}" stroke="#fff" stroke-width="1.4" opacity=".8"/><circle cx="${X(i).toFixed(1)}" cy="${Y(pts[i]).toFixed(1)}" r="4.5" fill="#fff"/>`;}
  out+=`<circle cx="${X(n).toFixed(1)}" cy="${Y(pts[n]).toFixed(1)}" r="4" fill="#fff"/>`;
  // x-axis year labels
  [0,Math.round(n/3),Math.round(2*n/3),n].forEach(i=>{const yr=2025+Math.round((i/n)*yrs);
    out+=`<text x="${X(i).toFixed(1)}" y="${H-6}" text-anchor="${i===0?'start':i>=n?'end':'middle'}" font-family="Inter" font-size="8" fill="#9aa0aa">${i===0?'Now':yr}</text>`;});
  out+=`<defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ec1c24"/><stop offset="1" stop-color="#ff7a80"/></linearGradient>
    <linearGradient id="ga" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ec1c24"/><stop offset="1" stop-color="#ec1c24" stop-opacity="0"/></linearGradient></defs></svg>`;
  return out;
}

/* ===== new-flow helpers ===== */
const ORCH_WANT={home:'protect the timeline, stay liquid',retire:'compound hard over decades',grow:'put idle cash to work in equities',income:'steady payouts from bonds & REITs'};
function AGENT_ADVICE(id){const M={
  home:'Comfortable here — enough stays within reach to protect your property plans as the date nears.',
  retire:'Let it run. Time in the market is doing the heavy lifting; resist the urge to tinker.',
  grow:'This finally puts your idle cash to work. Given your horizon you could even lean a touch bolder.',
  income:'The income sleeve should start paying you within the first quarter. Sensible and cash-flow friendly.'};
  return M[id]||'This looks reasonable for your situation.';}
function COACH_BASE(k){return `I'm watching your ${BK[k].name} basket. Add or drop funds and I'll tell you what each move does to your plan — like a coach reading the board.`;}
function bucketCoach(action,p){const k=p.cls,tk=prodTicker(p.name),g=state.goalLabel||'goal';
  const L={
    Funds:{add:`Bolder growth tilt with ${tk}. With your home loan to service, keep some cash buffer so a dip never forces your hand.`,remove:`Trimming equities lowers growth — fine if you're nervous, but you have time on your side for your ${g}.`},
    FI:{add:`${tk} steadies the ride — sensible while your ${g} is in sight.`,remove:`Less fixed income means a bumpier ride; watch this as your goal date nears.`},
    Cash:{add:`More cash means more safety and liquidity for your loan, but it's a drag on growth at your horizon.`,remove:`Cutting cash frees money to grow — just keep enough for emergencies and repayments.`},
    Alt:{add:`${tk} diversifies away from equities — a useful satellite. Keep it modest.`,remove:`Fewer alternatives means less of a cushion if equities wobble.`}};
  return (L[k]&&L[k][action])||(action==='tune'?`Updated ${tk} to S$${(p.amt||0).toLocaleString()} — that shifts ${BK[k].name} to ${state.buckets[k]}% of your plan.`:"Noted — I've reweighted your basket.");}
function prodTicker(name){const m=name.match(/\(([^)]+)\)/);if(m)return m[1];return name.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();}
function prodPct(p){const t=totalVal()||1;return Math.round((p.amt||0)/t*100);}
function productList(k,withGrowth){const ps=PRODUCTS.filter(p=>p.bucket===k);

      right=`<div style="text-align:right"><div class="pgrow">${g>=0?'+':''}${g}%</div><div class="pfv">S$${fv.toLocaleString()}</div></div>`;}
    return `<div class="prodcard" onclick="openChat('product:${p.id}')"><div class="picon" style="background:${BK[k].hex}">${tk.slice(0,2)}</div>

function setBucket(k){state.activeBucket=k;keepScroll(render);}
function seededRandom(seed,index){const x=Math.sin(seed+index*12.9898)*43758.5453;return x-Math.floor(x);}
function assetGrowthMult(asset,t){const seed=state.simSeed||42;const months=Math.round(t*12);let mult=1;
  for(let m=1;m<=months;m++){
    const monthlyRet=RET[asset]/12;const volatility=VOL[asset]/Math.sqrt(12);
    const noise=seededRandom(seed,m*1000+asset.charCodeAt(0))*2-1;const monthGrowth=monthlyRet+(noise*volatility);
    mult*=1+monthGrowth;}
  return mult;}
function productGrowthMult(product,t){const seed=state.simSeed||42;const months=Math.round(t*12);let mult=1;
  const asset=product.cls;const prodVariation=seededRandom(seed+9999,product.id.charCodeAt(0))*0.04-0.02;
  for(let m=1;m<=months;m++){
    const monthlyRet=(RET[asset]+prodVariation)/12;const volatility=VOL[asset]/Math.sqrt(12);
    const noise=seededRandom(seed,m*1000+product.id.charCodeAt(0)+product.id.charCodeAt(1))*2-1;const monthGrowth=monthlyRet+(noise*volatility);
    mult*=1+monthGrowth;}
  return mult;}
function holdingsSummary(){const t=state.simT||0;return KEYS4.map(k=>{const ps=PRODUCTS.filter(p=>p.bucket===k);if(!ps.length)return '';
  return `<div class="hsumg"><div class="hsumh"><span class="bdot" style="background:${BK[k].hex}"></span>${BK[k].name}<span class="hsumw">${state.buckets[k]}%</span></div>`+
    ps.map(p=>{const mult=productGrowthMult(p,t);const g=Math.round((mult-1)*100);return `<div class="hsumr"><span class="hsumn">${cleanName(p.name)} ${p.edited?'<span class="pbadge ed">Edited</span>':'<span class="pbadge ai">AI</span>'}</span><span class="hsumg2"><b style="color:${g>0?'#1f9d57':'var(--ink2)'}">${g>=0?'+':''}${g}%</b> · S$${Math.round((p.amt||0)*mult).toLocaleString()}</span></div>`;}).join('')+`</div>`;}).join('');}function openTune(k){state.editBucket=k;state._coachMsg=null;go('tune');}

/* ===== volatile projection series (real ups & downs + news shocks) ===== */
function projSeries(){const n=Math.max(24,horizon()*12),r=pRetEff()/12,base=Math.max(1000,state.invest);const pts=[];
  for(let i=0;i<=n;i++){const t=i/n;
    const drift=base*Math.pow(1+r,i)+(state.monthly>0?state.monthly*((Math.pow(1+r,i)-1)/r):0);
    let shock=0;NEWS.forEach(ev=>{const d=t-ev.x;shock+=ev.dir*0.14*Math.exp(-Math.pow(d*7,2));});
    const wave=Math.sin(i*0.55)*0.055+Math.sin(i*0.27+1)*0.038+Math.sin(i*1.15+2)*0.022;
    pts.push(Math.max(base*0.6,drift*(1+wave+shock)));}
  return pts;}

/* ===== live sandbox projection (updates as you add/remove) ===== */
function sandProjValue(yrs){const r=pRetEff(),rm=r/12,n=(yrs||horizon())*12;let v=(totalVal()||0)*Math.pow(1+rm,n);
  if(state.monthly>0)v+=state.monthly*((Math.pow(1+rm,n)-1)/rm);return Math.round(v);}
function sandSeries(){const n=Math.max(24,horizon()*12),r=pRetEff()/12,base=totalVal()||0;const pts=[];
  for(let i=0;i<=n;i++){let v=base*Math.pow(1+r,i)+(state.monthly>0?state.monthly*((Math.pow(1+r,i)-1)/r):0);
    const wave=Math.sin(i*0.5)*0.016+Math.sin(i*0.23+1)*0.011;pts.push(v*(1+wave));}
  return pts;}
function sandMiniChart(){const pts=sandSeries(),n=pts.length-1,t=targetVal(),yrs=horizon();
  const W=300,H=104,padL=36,padR=8,padT=8,padB=16;
  const aiv=state._aiProj||pts[n];
  const ceil=Math.max(t,aiv,Math.max.apply(null,pts))*1.06, floor=Math.min(POOL,Math.min.apply(null,pts))*0.97;
  const plotW=W-padL-padR, plotH=(H-padB)-padT;
  const X=i=>padL+i/n*plotW,Y=v=>(H-padB)-(v-floor)/(ceil-floor)*plotH;
  const ok=pts[n]>=t,col=ok?'#1f9d57':'#e0883a',gy=Y(t);
  let out=`<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">`;
  // y gridlines + value labels
  for(let g=0;g<=2;g++){const yy=padT+g*plotH/2;const val=ceil-(g/2)*(ceil-floor);
    out+=`<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${W-padR}" y2="${yy.toFixed(1)}" stroke="rgba(0,0,0,.05)"/>`;
    out+=`<text x="${padL-5}" y="${(yy+3).toFixed(1)}" text-anchor="end" font-family="Inter" font-size="7.5" fill="#9aa0aa">S$${Math.round(val/1000)}k</text>`;}
  // axis lines
  out+=`<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${H-padB}" stroke="rgba(0,0,0,.16)"/>`;
  out+=`<line x1="${padL}" y1="${H-padB}" x2="${W-padR}" y2="${H-padB}" stroke="rgba(0,0,0,.16)"/>`;
  // goal line
  out+=`<line x1="${padL}" y1="${gy.toFixed(1)}" x2="${W-padR}" y2="${gy.toFixed(1)}" stroke="#9aa0aa" stroke-width="1.2" stroke-dasharray="4 4"/>`;
  out+=`<text x="${padL+3}" y="${Math.max(padT+8,gy-4).toFixed(1)}" font-family="Inter" font-size="8" fill="#737984">Goal S$${Math.round(t/1000)}k</text>`;
  // AI plan reference
  if(state._aiProj){const ay=Y(state._aiProj);out+=`<line x1="${padL}" y1="${ay.toFixed(1)}" x2="${W-padR}" y2="${ay.toFixed(1)}" stroke="#caa23a" stroke-width="1.2" stroke-dasharray="3 3" opacity=".8"/><text x="${W-padR}" y="${Math.max(padT+8,ay-3).toFixed(1)}" text-anchor="end" font-family="Inter" font-weight="700" font-size="8" fill="#caa23a">AI Plan S$${Math.round(state._aiProj/1000)}k</text>`;}// area + line
  let d='';for(let i=0;i<=n;i++)d+=(i?'L':'M')+X(i).toFixed(1)+' '+Y(pts[i]).toFixed(1)+' ';
  out+=`<path d="${d}L ${X(n).toFixed(1)} ${H-padB} L ${X(0).toFixed(1)} ${H-padB} Z" fill="${col}" opacity=".12"/>`;
  out+=`<path d="${d}" fill="none" stroke="${col}" stroke-width="2.4" stroke-linejoin="round"/>`;
  out+=`<circle cx="${X(n).toFixed(1)}" cy="${Y(pts[n]).toFixed(1)}" r="3.8" fill="${col}"/>`;
  // x-axis year labels
  [0,Math.round(n/2),n].forEach(i=>{const yr=2025+Math.round((i/n)*yrs);
    out+=`<text x="${X(i).toFixed(1)}" y="${H-4}" text-anchor="${i===0?'start':i>=n?'end':'middle'}" font-family="Inter" font-size="7.5" fill="#9aa0aa">${i===0?'Now':yr}</text>`;});
  out+=`</svg>`;return out;}
function sandProjPanel(){const yr=2025+horizon(),proj=sandProjValue(),t=targetVal(),ok=proj>=t,short=Math.max(0,Math.round((t-proj)/1000));
  const r=pRetEff();const ytg=(r>0&&t>POOL)?Math.log(t/POOL)/Math.log(1+r):0;const hitYr=Math.ceil(2025+ytg);const late=Math.max(1,hitYr-yr);

function stressResult(ev){const tot=totalVal()||1;let dd=0;KEYS4.forEach(k=>{dd+=(bucketVal(k)/tot)*(ev.shock[k]||0);});
  const v0=totalVal();return {dd:dd,trough:Math.round(v0*(1+dd/100)),v0:v0};}
function stressChart(ev,r){const v0=r.v0,trough=r.trough,rec=ev.recover,total=Math.round(rec*1.35)+1;
  const W=300,H=98,padL=8,padR=8,padT=14,padB=16;
  const pts=[];const tDip=Math.max(1,Math.round(rec*0.14));
  for(let m=0;m<=total;m++){let v;
    if(m<=tDip)v=v0+(trough-v0)*(m/tDip);
    else if(m<=rec){const f=(m-tDip)/(rec-tDip);v=trough+(v0-trough)*Math.pow(f,.85);}
    else v=v0*(1+0.05*((m-rec)/12));
    pts.push(v);}
  const n=pts.length-1,ti=pts.indexOf(Math.min.apply(null,pts));
  const minV=Math.min.apply(null,pts)*.99,maxV=Math.max.apply(null,pts)*1.01;
  const X=i=>padL+i/n*(W-padL-padR),Y=v=>(H-padB)-(v-minV)/(maxV-minV)*((H-padB)-padT);
  let d1='',d2='';pts.forEach((v,i)=>{if(i<=ti)d1+=(i?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)+' ';if(i>=ti)d2+=(i===ti?'M':'L')+X(i).toFixed(1)+' '+Y(v).toFixed(1)+' ';});
  const by=Y(v0),reci=Math.min(n,rec);
  let out=`<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">`;
  out+=`<line x1="${padL}" y1="${by.toFixed(1)}" x2="${W-padR}" y2="${by.toFixed(1)}" stroke="#9aa0aa" stroke-dasharray="3 3"/>`;
  out+=`<text x="${padL+2}" y="${Math.max(padT,by-4).toFixed(1)}" font-family="Inter" font-size="8" fill="#737984">Starting S$${Math.round(v0/1000)}k</text>`;
  out+=`<path d="${d2}L ${X(n).toFixed(1)} ${H-padB} L ${X(ti).toFixed(1)} ${H-padB} Z" fill="#1f9d5712"/>`;
  out+=`<path d="${d1}" fill="none" stroke="#e0454d" stroke-width="2.4" stroke-linejoin="round"/>`;
  out+=`<path d="${d2}" fill="none" stroke="#1f9d57" stroke-width="2.4" stroke-linejoin="round"/>`;
  out+=`<circle cx="${X(ti).toFixed(1)}" cy="${Y(pts[ti]).toFixed(1)}" r="3.6" fill="#e0454d"/>`;
  out+=`<text x="${X(ti).toFixed(1)}" y="${(Y(pts[ti])+13).toFixed(1)}" text-anchor="middle" font-family="Inter" font-weight="700" font-size="8" fill="#e0454d">trough</text>`;
  out+=`<circle cx="${X(reci).toFixed(1)}" cy="${Y(pts[reci]).toFixed(1)}" r="3.6" fill="#1f9d57"/>`;
  out+=`<text x="${X(reci).toFixed(1)}" y="${Math.max(padT,Y(pts[reci])-6).toFixed(1)}" text-anchor="middle" font-family="Inter" font-weight="700" font-size="8" fill="#1f9d57">recovered</text>`;
  out+=`<text x="${padL}" y="${H-4}" font-family="Inter" font-size="7.5" fill="#9aa0aa">crash</text>`;
  out+=`<text x="${X(reci).toFixed(1)}" y="${H-4}" text-anchor="middle" font-family="Inter" font-size="7.5" fill="#9aa0aa">${rec>=12?(rec/12).toFixed(rec%12?1:0)+'y':rec+'mo'}</text>`;
  return out+`</svg>`;}
function stressBars(ev){const held=KEYS4.filter(k=>bucketVal(k)>0);if(!held.length)return'';
  const maxMag=Math.max.apply(null,KEYS4.map(k=>Math.abs(ev.shock[k]||0)).concat([10]));

function stressPanel(){const ev=stressEv();const r=stressResult(ev);const ddAbs=Math.abs(Math.round(r.dd));

function sparkline(series){const W=320,H=70,pad=4,n=series.length-1;if(n<1)return'';
  const min=Math.min(...series)*.999,max=Math.max(...series)*1.001;
  const X=i=>pad+i/n*(W-2*pad),Y=v=>H-pad-(v-min)/(max-min||1)*(H-2*pad);
  let d='';series.forEach((v,i)=>d+=(i?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)+' ');
  const up=series[n]>=series[0];const col=up?'#34d399':'#fca5a5';
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><path d="${d}" fill="none" stroke="${col}" stroke-width="2.4" stroke-linejoin="round"/><circle cx="${X(n)}" cy="${Y(series[n])}" r="3.5" fill="#fff"/></svg>`;}

function toggleAgent(id){

    const agN=CARAG.length+1;
    function agTo(n){
      const prev=agIdx;
      agIdx=(n+agN)%agN;
      for(let i=0;i<agN;i++){
        const el=document.getElementById('agslide'+i);
        const dot=document.getElementById('agdot'+i);
        const active=(i===agIdx);
        if(el){el.style.opacity=active?'1':'0';el.style.transform=active?'translateX(0px)':'translateX(24px)';el.style.pointerEvents=active?'auto':'none';}
        if(dot){dot.style.width=active?'16px':'6px';dot.style.background=active?'#fff':'rgba(255,255,255,.4)';}
      }
    }
    // Auto-advance every 5s
    window._agTimer=setInterval(()=>agTo(agIdx+1),3000);
    // Tap carousel to advance manually
    const car=document.getElementById('agCarousel');
    if(car)car.addEventListener('click',()=>{agTo(agIdx+1);clearInterval(window._agTimer);window._agTimer=setInterval(()=>agTo(agIdx+1),3000);});

    for(let i=0;i<agN;i++){

    }
  },0);
}

function setPaperAmt(v){state.paper.amount=v;state.paper._touched=true;keepScroll(()=>{$('paperBody').innerHTML=paperBody();});}

  PRODUCTS.forEach(p=>p._wk=0);keepScroll(()=>{$('paperBody').innerHTML=paperBody();});toast('Paper positions opened');}
function advancePaper(){const pp=state.paper;pp.step++;
  let prev=pp.series[pp.series.length-1];const prods=PRODUCTS.filter(p=>p.bucket);
  prods.forEach(p=>{const vol=VOL[p.bucket],drift=RET[p.bucket]/12;const mo=(drift+(Math.random()-.46)*vol/3.2)*100;p._wk=(p._wk||0)+mo;});
  const moRet=prods.reduce((s,p)=>s+(RET[p.bucket]/12+(Math.random()-.46)*VOL[p.bucket]/3.2),0)/Math.max(prods.length,1);
  pp.series.push(prev*(1+moRet));
  keepScroll(()=>{$('paperBody').innerHTML=paperBody();});}

function agTo(n){
